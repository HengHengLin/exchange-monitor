name: 竞对动态监控

on:
  schedule:
    - cron: '*/5 * * * *'   # 每5分钟触发一次（GitHub Actions 最小粒度）
  workflow_dispatch:          # 允许手动触发，方便测试

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 允许写入 seen_guids.json 回仓库

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run monitor
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python monitor.py --once   # 单次执行，不循环

      - name: Save seen_guids back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_guids.json
          git diff --cached --quiet || git commit -m "chore: update seen_guids [skip ci]"
          git push
